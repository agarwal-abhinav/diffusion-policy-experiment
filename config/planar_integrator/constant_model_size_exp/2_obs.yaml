# config for target conditioned experiments

_target_: diffusion_policy.workspace.train_diffusion_unet_lowdim_workspace_no_env.TrainDiffusionUnetLowdimWorkspaceNoEnv
checkpoint:
  save_last_ckpt: true
  save_last_snapshot: false
  topk:
    format_str: epoch={epoch:04d}-val_loss={val_loss:.3f}.ckpt
    k: 10
    mode: min
    monitor_key: val_loss
dataloader:
  batch_size: 256
  num_workers: 1
  persistent_workers: false
  pin_memory: true
  shuffle: true
ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  inv_gamma: 1.0
  max_value: 0.9999
  min_value: 0.0
  power: 0.75
  update_after_step: 0
exp_name: default
logging:
  group: null
  id: null
  mode: online
  name: 2_obs_cms_horizon_32
  project: planar_integrator_test
  resume: true
  tags:
  - train_diffusion_unet_lowdim_target_conditioned
  - maze_lowdim
  - default
multi_run:
  run_dir: data/outputs/2024.01.16/train_diffusion_unet_lowdim_maze_target_conditioned
  wandb_name_base: train_diffusion_unet_lowdim_maze_target_conditioned
n_action_steps: 8
n_latency_steps: 0
n_obs_steps: 2
horizon: 32
obs_dim: 2
action_dim: 2
target_dim: null
name: train_diffusion_unet_lowdim
obs_as_global_cond: true
obs_as_local_cond: false
optimizer:
  _target_: torch.optim.AdamW
  betas:
  - 0.95
  - 0.999
  eps: 1.0e-08
  lr: 0.0001
  weight_decay: 1.0e-06
past_action_visible: false
policy:
  _target_: diffusion_policy.policy.diffusion_unet_lowdim_policy_constant_size.DiffusionUnetLowdimPolicy
  obs_dim: ${obs_dim}
  action_dim: ${action_dim}
  target_dim: ${target_dim}
  horizon: ${horizon}
  model:
    _target_: diffusion_policy.model.diffusion.conditional_unet1d.ConditionalUnet1D
    cond_predict_scale: true
    diffusion_step_embed_dim: 64
    down_dims:
    - 64
    - 128
    - 256
    global_cond_dim: 32 # 16 is the max context length we are testing
    target_dim: ${target_dim} 
    input_dim: ${action_dim}
    kernel_size: 3
    local_cond_dim: null
    n_groups: 8
  n_action_steps: ${n_action_steps}
  n_obs_steps: ${n_obs_steps}
  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddpm.DDPMScheduler
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    beta_start: 0.0001
    clip_sample: true
    num_train_timesteps: 100
    prediction_type: epsilon
    variance_type: fixed_small
  num_inference_steps: 100
  oa_step_convention: true # keep true
  obs_as_global_cond: true # keep true
  obs_as_local_cond: false # keep false
  use_target_cond: false # must be true for this experiment
  pred_action_steps_only: false
pred_action_steps_only: false
task:
  action_dim: ${action_dim}
  dataset:
    _target_: diffusion_policy.dataset.drake_maze_target_conditioned_dataset.MazeLowdimTargetConditionedDataset
    horizon: ${horizon}
    max_train_episodes: null # I think this caps the number of training episodes
    pad_after: ${eval:${n_action_steps} - 1}
    pad_before: ${eval:${n_obs_steps} - 1}
    seed: 42
    val_ratio: 0.01
    # Override if using smaller dataset
    # ex. task.dataset.zarr_path=data/maze/maze_dataset_target_conditioned_100.zarr
    zarr_path: data/diffusion_experiments/planar_integrator_task/collection_4_2000_each.zarr
  name: maze_lowdim_target_conditioned
  obs_dim: ${obs_dim}
task_name: maze_lowdim_target_conditioned
training:
  checkpoint_every: 5
  debug: false
  device: cuda:0
  gradient_accumulate_every: 1
  lr_scheduler: cosine
  lr_warmup_steps: 500
  max_train_steps: null
  max_val_steps: null
  num_epochs: 200
  resume: true
  rollout_every: 5
  sample_every: 5
  seed: 42
  tqdm_interval_sec: 1.0
  use_ema: true
  val_every: 1
val_dataloader:
  batch_size: 256
  num_workers: 1
  persistent_workers: false
  pin_memory: true
  shuffle: false