_target_: diffusion_policy.workspace.train_mae_workspace.TrainMAEWorkspace

mae_model:
  _target_: diffusion_policy.model.vision.mae_model.MAEModel
  vit_model_name: vit_small_patch16_224
  pretrained: true
  img_size: 112
  patch_size: 16
  mask_ratio: 0.75
  decoder_embed_dim: 256
  decoder_depth: 4
  decoder_num_heads: 8
  norm_pix_loss: true

dataset:
  zarr_configs:
  - path: data/iros/long_context_planar_pushing/start_bin_4_sorted.zarr
    val_ratio: 0.05
  - path: data/iros/long_context_planar_pushing/start_bin_4_via_mirror_sorted_reversed.zarr
    val_ratio: 0.05
  - path: data/iros/long_context_planar_pushing/start_bin_0_sorted_reversed.zarr
    val_ratio: 0.05
  - path: data/iros/long_context_planar_pushing/start_bin_0_via_mirror_sorted.zarr
    val_ratio: 0.05
  - path: data/iros/long_context_planar_pushing/start_bin_1_sorted.zarr
    val_ratio: 0.05
  - path: data/iros/long_context_planar_pushing/start_bin_1_via_mirror_sorted_reversed.zarr
    val_ratio: 0.05
  - path: data/iros/long_context_planar_pushing/start_bin_3_sorted_reversed.zarr
    val_ratio: 0.05
  - path: data/iros/long_context_planar_pushing/start_bin_3_via_mirror_sorted.zarr
    val_ratio: 0.05
  rgb_keys:
  - overhead_camera
  - wrist_camera
  crop_shape:
  - 112
  - 112
  img_shape:
  - 3
  - 128
  - 128
  imagenet_norm: true
  val_ratio: 0.05
  seed: 42

dataloader:
  batch_size: 256
  num_workers: 8
  pin_memory: true
  shuffle: true
  persistent_workers: false

val_dataloader:
  batch_size: 256
  num_workers: 4
  pin_memory: true
  shuffle: false
  persistent_workers: false

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.5e-4
  betas:
  - 0.9
  - 0.95
  weight_decay: 0.05

ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  inv_gamma: 1.0
  max_value: 0.9999
  min_value: 0.0
  power: 0.75
  update_after_step: 0

checkpoint:
  save_last_ckpt: true
  save_last_snapshot: false
  topk:
    format_str: epoch={epoch:04d}-val_loss={val_loss:.6f}.ckpt
    k: 3
    mode: min
    monitor_key: val_loss

logging:
  project: mae_pretrain
  group: null
  id: null
  mode: online
  name: mae_vit_small_dino_planar_pushing
  resume: true
  tags:
  - mae
  - pretrain
  - planar_pushing

training:
  device: cuda
  seed: 42
  num_epochs: 200
  lr_scheduler: cosine
  lr_warmup_steps: 500
  val_every: 5
  checkpoint_every: 5
  resume: true
  debug: false
  tqdm_interval_sec: 10.0
  use_amp: true
  use_ema: true
  log_reconstructions_every: 20
  max_train_steps: null
  max_val_steps: null
