_target_: diffusion_policy.workspace.train_diffusion_transformer_hybrid_workspace.TrainDiffusionTransformerHybridWorkspace
checkpoint:
  - save_last_ckpt: true
    save_last_snapshot: false
    topk:
      format_str: epoch={epoch:04d}-val_loss={val_loss:.4f}-val_ddim_mse={val_ddim_mse:.4f}.ckpt
      k: 5
      mode: min
      monitor_key: val_loss
      min_training_steps: 50000
  - save_last_ckpt: true
    save_last_snapshot: false
    topk:
      format_str: epoch={epoch:04d}-val_loss={val_loss:.4f}-val_ddim_mse={val_ddim_mse:.4f}.ckpt
      k: 5
      mode: min
      monitor_key: val_ddim_mse
      min_training_steps: 50000
checkpoint_interval:
  last_n_steps: 30000
  num_checkpoints: 3
dataloader:
  batch_size: 64
  num_workers: 8
  shuffle: true
  pin_memory: true
  persistent_workers: false
ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999
keypoint_visible_rate: 1.0
task_name: planar_pushing
logging:
  project: iros_t_pushing_data_scaling
  resume: True
  mode: online
  name: dit_full_attn_obs_20_data_80
  tags: ["${name}", "${task_name}"]
  id: null
  group: null
multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}
horizon: 36
n_obs_steps: 20
n_action_steps: 8
n_latency_steps: 0
dataset_obs_steps: ${n_obs_steps}
past_action_visible: false
obs_as_cond: true
name: train_diffusion_transformer_hybrid
optimizer:
  transformer_weight_decay: 1.0e-3
  obs_encoder_weight_decay: 1.0e-6
  learning_rate: 1.0e-4
  betas: [0.9, 0.95]
shape_meta:
  action:
    shape:
    - 2
  obs:
    agent_pos:
      shape:
      - 3
      type: low_dim
    overhead_camera:
      shape:
      - 3
      - 128
      - 128
      type: rgb
    wrist_camera:
      shape:
      - 3
      - 128
      - 128
      type: rgb
policy:
  _target_: diffusion_policy.policy.diffusion_transformer_hybrid_image_policy.DiffusionTransformerHybridImagePolicy
  shape_meta: ${shape_meta}
  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddpm.DDPMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    variance_type: fixed_small
    clip_sample: True
    prediction_type: epsilon
  horizon: ${horizon}
  n_action_steps: ${n_action_steps}
  n_obs_steps: ${n_obs_steps}
  num_inference_steps: 100
  crop_shape: [112, 112]
  obs_encoder_group_norm: true
  eval_fixed_crop: true
  n_layer: 16
  n_cond_layers: 0
  n_head: 8
  n_emb: 576
  p_drop_emb: 0.0
  p_drop_attn: 0.2
  causal_attn: false
  time_as_cond: true
  obs_as_cond: ${obs_as_cond}
task:
  dataset:
    _target_: diffusion_policy.dataset.planar_pushing_dataset_improved_sampling.PlanarPushingDataset
    shape_meta: ${shape_meta}
    horizon: ${horizon}
    n_obs_steps: ${n_obs_steps}
    pad_after: 7
    pad_before: 19
    seed: 42
    zarr_configs:
    - path: data/planar_pushing_cotrain/sim_sim_tee_data_carbon_large.zarr
      max_train_episodes: 80
      sampling_weight: null
      val_ratio: 0.0625
  name: scene_image
  shape_meta: ${shape_meta}
new_type_dataloader: true
training:
  device: "cuda"
  seed: 42
  debug: false
  resume: true
  lr_scheduler: cosine
  lr_warmup_steps: 1000
  num_epochs: 300
  gradient_accumulate_every: 1
  use_ema: true
  rollout_every: 5
  checkpoint_every: 5
  val_every: 1
  sample_every: ${training.checkpoint_every}
  max_train_steps: null
  max_val_steps: null
  log_val_mse: true
  tqdm_interval_sec: 30.0
  eval_mse_DDIM: true
  eval_mse_DDPM: true
  total_train_steps: 150000
val_dataloader:
  batch_size: 64
  num_workers: 8
  shuffle: False
  pin_memory: True
  persistent_workers: False
